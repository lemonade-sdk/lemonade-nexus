<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="trayLemon" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="60%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#D4A017"/>
    </radialGradient>
    <filter id="ts" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Lemon body -->
  <ellipse cx="16" cy="17" rx="12" ry="10.5" fill="url(#trayLemon)" filter="url(#ts)"/>

  <!-- Highlight -->
  <ellipse cx="13" cy="13.5" rx="5" ry="3.5" fill="#FFF9E0" opacity="0.4"/>

  <!-- Leaf -->
  <path d="M 16 7 Q 19 4 22 5.5 Q 19 7 16 7 Z" fill="#2D8B4E"/>

  <!-- Mesh nodes (simplified) -->
  <circle cx="16" cy="13" r="2.5" fill="#FFF" stroke="#D4A017" stroke-width="1"/>
  <circle cx="11" cy="16" r="1.8" fill="#FFF" stroke="#D4A017" stroke-width="0.8"/>
  <circle cx="21" cy="16" r="1.8" fill="#FFF" stroke="#D4A017" stroke-width="0.8"/>
  <circle cx="16" cy="20" r="2" fill="#FFF" stroke="#D4A017" stroke-width="1"/>

  <!-- Connection lines -->
  <line x1="16" y1="13" x2="11" y2="16" stroke="#FFF" stroke-width="0.8" opacity="0.7"/>
  <line x1="16" y1="13" x2="21" y2="16" stroke="#FFF" stroke-width="0.8" opacity="0.7"/>
  <line x1="11" y1="16" x2="16" y2="20" stroke="#FFF" stroke-width="0.8" opacity="0.7"/>
  <line x1="21" y1="16" x2="16" y2="20" stroke="#FFF" stroke-width="0.8" opacity="0.7"/>
</svg>
