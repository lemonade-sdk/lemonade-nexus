name: lemonade_nexus
description: Lemonade Nexus VPN Client (macOS, Windows; mobile-ready)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  ffi: ^2.1.0
  path: ^1.8.3
  json_annotation: ^4.8.1
  package_info_plus: ^5.0.1
  # Cross-platform system-tray / menu-bar + window control (macOS + Windows).
  tray_manager: ^0.2.1
  window_manager: ^0.4.2
  # Persistence: non-secret settings + secure credential storage
  # (Keychain on macOS, DPAPI-backed credential locker on Windows).
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  # Windows-only integration (registry auto-start, SCM service, known folders).
  win32: ^5.0.0
  win32_registry: ^1.1.0
  path_provider: ^2.1.0
  http: ^1.1.0
  http_parser: ^4.0.2
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.3
  integration_test:
    sdk: flutter
  msix: ^3.16.6
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/

msix_config:
  display_name: Lemonade Nexus VPN
  publisher_display_name: Lemonade Nexus
  identity_name: LemonadeNexus.LemonadeNexusVPN
  version: 1.0.0.0
  architecture: x64
  languages: en-us
  sign_msix: false
  msix_version: 1.0.0.0
  publisher: CN=Lemonade Nexus, O=Lemonade Nexus, C=US
  capabilities: internetClient, internetClientServer
  output_path: build/windows/msix
  output_name: lemonade_nexus
