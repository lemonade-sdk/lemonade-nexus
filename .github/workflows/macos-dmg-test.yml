name: macOS DMG (test build)

# On-demand macOS app .dmg build. Builds the app the same way the release
# pipeline does, but uploads it as a downloadable artifact instead of cutting a
# release. Ad-hoc signed (no signing secrets / notarization), so the downloaded
# app needs a one-time right-click -> Open (or:
# xattr -dr com.apple.quarantine LemonadeNexus.app).
#
# Run it against ANY branch from the Actions tab ("Run workflow" -> pick a
# branch) or from the CLI:
#
#   gh workflow run macos-dmg-test.yml --ref <branch>
#   gh run watch $(gh run list --workflow=macos-dmg-test.yml -L1 --json databaseId --jq '.[0].databaseId')
#   gh run download <run-id> -n LemonadeNexus-dmg-test -D ./dmg
#
# (workflow_dispatch is only registered once this file is on the default branch;
# the branch you dispatch must also contain this file.)

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  dmg:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-macos-dmg-${{ hashFiles('cmake/libraries/*.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-macos-dmg-

      - name: Build C++ SDK and dependencies
        run: |
          # Static OpenSSL so the .app has no Homebrew dylib dependency.
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=OFF \
            -DOPENSSL_FORCE_BUNDLED=ON
          cmake --build build --target LemonadeNexusSDK --parallel

      - name: Build Swift app (ad-hoc signed)
        working-directory: apps/LemonadeNexusMac
        run: bash Packaging/build.sh

      - name: Verify app has no external OpenSSL/Homebrew linkage
        run: |
          bin="apps/LemonadeNexusMac/.build/LemonadeNexus.app/Contents/MacOS/LemonadeNexusMac"
          echo "otool -L $bin:"
          otool -L "$bin"
          if otool -L "$bin" | tail -n +2 | grep -E '/opt/homebrew/|/usr/local/|libssl|libcrypto'; then
            echo "::error::App links an external OpenSSL/Homebrew dylib — it will crash on user Macs"
            exit 1
          fi
          echo "OK: OpenSSL is statically linked; no external dylib dependency"

      - name: Create DMG
        working-directory: apps/LemonadeNexusMac
        run: bash Packaging/create_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LemonadeNexus-dmg-test
          path: apps/LemonadeNexusMac/.build/LemonadeNexus.dmg
          if-no-files-found: error
