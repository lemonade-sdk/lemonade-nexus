name: Release Windows Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.35.0'
  BUILD_TYPE: release

jobs:
  # Get version from tag or input
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-clean: ${{ steps.version.outputs.version-clean }}

    steps:
      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version-tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version-clean=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get version from input
        if: github.event_name == 'workflow_dispatch'
        id: version-input
        run: |
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "version-clean=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Set version output
        id: version
        run: |
          if [ "${{ steps.version-tag.outputs.version }}" != "" ]; then
            echo "version=${{ steps.version-tag.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.version-input.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

  # Build all package types
  build-windows-packages:
    name: Build Windows Packages
    runs-on: windows-latest
    needs: get-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: apps/LemonadeNexus
        run: flutter pub get

      - name: Build Flutter Windows app
        working-directory: apps/LemonadeNexus
        run: flutter build windows --release --dart-define=VERSION=${{ needs.get-version.outputs.version }}

      - name: Create MSIX package
        working-directory: apps/LemonadeNexus
        run: dart run msix:create

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Build MSI installer
        working-directory: apps/LemonadeNexus/windows/packaging/MSI
        run: |
          $buildDir = "$(Get-Location)\..\..\..\build\windows\runner\Release"
          New-Item -ItemType Directory -Path obj -Force | Out-Null
          candle -arch x64 -dBuildDir="$buildDir" -out obj\ Product.wxs Installer.wxs
          light -cultures:en-us -out lemonade_nexus_setup.msi -sval obj\Product.wixobj obj\Installer.wixobj

      - name: Create portable package
        working-directory: apps/LemonadeNexus
        shell: pwsh
        run: |
          $buildDir = "build\windows\runner\Release"
          $outputDir = "build\windows\packages\exe"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          Copy-Item "$buildDir\lemonade_nexus.exe" "$outputDir\" -Force
          Copy-Item "$buildDir\flutter_windows.dll" "$outputDir\" -Force
          Copy-Item "$buildDir\icudtl.dat" "$outputDir\" -Force
          Copy-Item -Recurse "$buildDir\data" "$outputDir\" -Force

          Compress-Archive -Path "$outputDir\*" -DestinationPath "build\windows\packages\lemonade_nexus_portable.zip" -Force

      - name: Rename packages with version
        working-directory: apps/LemonadeNexus
        shell: pwsh
        run: |
          $version = "${{ needs.get-version.outputs.version }}"
          $msixPath = "build\windows\runner\Release\lemonade_nexus.msix"
          $msiPath = "build\windows\packaging\MSI\lemonade_nexus_setup.msi"
          $zipPath = "build\windows\packages\lemonade_nexus_portable.zip"

          if (Test-Path $msixPath) {
            Rename-Item -Path $msixPath -NewName "lemonade_nexus-${version}.msix"
          }
          if (Test-Path $msiPath) {
            Rename-Item -Path $msiPath -NewName "lemonade_nexus_setup-${version}.msi"
          }
          if (Test-Path $zipPath) {
            Rename-Item -Path $zipPath -NewName "lemonade_nexus_portable-${version}.zip"
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-msix
          path: apps/LemonadeNexus/build/windows/runner/Release/lemonade_nexus-*.msix

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-msi
          path: apps/LemonadeNexus/windows/packaging/MSI/lemonade_nexus_setup-*.msi

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-portable
          path: apps/LemonadeNexus/build/windows/packages/lemonade_nexus_portable-*.zip

  # Code signing (optional - requires signing certificate)
  sign-packages:
    name: Sign Packages
    runs-on: windows-latest
    needs: [get-version, build-windows-packages]
    if: ${{ secrets.CERT_PASSWORD != '' }}

    steps:
      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: lemonade-nexus-msix

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: lemonade-nexus-msi

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: lemonade-nexus-portable

      - name: Import code signing certificate
        shell: pwsh
        env:
          CERT_PFX: ${{ secrets.CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          $pfxPath = "code_signing.pfx"
          $certBytes = [Convert]::FromBase64String($env:CERT_PFX)
          [IO.File]::WriteAllBytes($pfxPath, $certBytes)

          # Import certificate
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:CERT_PASSWORD -Force -AsPlainText)

      - name: Sign MSIX package
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          $msixFile = Get-ChildItem -Path . -Filter "lemonade_nexus-*.msix" | Select-Object -First 1
          if ($msixFile) {
            & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe" sign `
              /f code_signing.pfx `
              /p $env:CERT_PASSWORD `
              /t http://timestamp.digicert.com `
              /fd sha256 `
              $msixFile.FullName
          }

      - name: Sign MSI installer
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          $msiFile = Get-ChildItem -Path . -Filter "lemonade_nexus_setup-*.msi" | Select-Object -First 1
          if ($msiFile) {
            & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe" sign `
              /f code_signing.pfx `
              /p $env:CERT_PASSWORD `
              /t http://timestamp.digicert.com `
              /fd sha256 `
              $msiFile.FullName
          }

      - name: Sign portable executable
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          $zipFile = Get-ChildItem -Path . -Filter "lemonade_nexus_portable-*.zip" | Select-Object -First 1
          if ($zipFile) {
            # Extract, sign exe, re-zip
            $extractPath = "portable_extract"
            New-Item -ItemType Directory -Path $extractPath -Force | Out-Null
            Expand-Archive -Path $zipFile.FullName -DestinationPath $extractPath

            $exeFile = Get-ChildItem -Path $extractPath -Filter "*.exe" | Select-Object -First 1
            if ($exeFile) {
              & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe" sign `
                /f code_signing.pfx `
                /p $env:CERT_PASSWORD `
                /t http://timestamp.digicert.com `
                /fd sha256 `
                $exeFile.FullName
            }

            # Re-create ZIP
            Remove-Item $zipFile.FullName
            Compress-Archive -Path "$extractPath\*" -DestinationPath $zipFile.FullName -Force
            Remove-Item $extractPath -Recurse -Force
          }

      - name: Upload signed MSIX
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-msix-signed
          path: lemonade_nexus-*.msix

      - name: Upload signed MSI
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-msi-signed
          path: lemonade_nexus_setup-*.msi

      - name: Upload signed portable
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-portable-signed
          path: lemonade_nexus_portable-*.zip

  # Create GitHub release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [get-version, build-windows-packages]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lemonade-nexus-*
          merge-multiple: true

      - name: List files
        run: ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: Lemonade Nexus VPN v${{ needs.get-version.outputs.version }}
          generate_release_notes: true
          files: |
            lemonade_nexus-*.msix
            lemonade_nexus_setup-*.msi
            lemonade_nexus_portable-*.zip
          body: |
            ## Lemonade Nexus VPN v${{ needs.get-version.outputs.version }}

            ### Windows Packages

            | Package Type | File | Description |
            |--------------|------|-------------|
            | MSIX | `lemonade_nexus-*.msix` | Modern Windows package (recommended for Windows 10/11) |
            | MSI | `lemonade_nexus_setup-*.msi` | Traditional installer (enterprise deployment) |
            | Portable | `lemonade_nexus_portable-*.zip` | Standalone executable (no installation required) |

            ### Installation

            #### MSIX (Recommended for most users)
            ```powershell
            # Double-click to install, or use PowerShell
            Add-AppxPackage lemonade_nexus-*.msix
            ```

            #### MSI (Enterprise deployment)
            ```powershell
            # Silent install
            msiexec /i lemonade_nexus_setup-*.msi /quiet

            # Deploy via SCCM/Intune
            # Use the .msi file with your MDM solution
            ```

            #### Portable
            ```powershell
            # Extract and run
            Expand-Archive lemonade_nexus_portable-*.zip
            cd lemonade_nexus_portable
            .\lemonade_nexus.exe
            ```

            ### Verification

            All packages are code-signed by Lemonade Nexus.
            Verify the signature:
            ```powershell
            Get-AuthenticodeSignature lemonade_nexus-*.msix
            ```

            ### Support

            - Issues: https://github.com/antmi/lemonade-nexus/issues
            - Documentation: https://github.com/antmi/lemonade-nexus/tree/main/docs

  # Publish to Winget (optional)
  publish-winget:
    name: Publish to Winget
    runs-on: ubuntu-latest
    needs: [get-version, create-release]
    if: ${{ !contains(github.ref, '-pre') }}

    steps:
      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: lemonade-nexus-msix

      - name: Get MSIX filename
        id: msix-file
        run: |
          MSIX_FILE=$(ls lemonade_nexus-*.msix | head -1)
          echo "filename=$MSIX_FILE" >> "$GITHUB_OUTPUT"

      - name: Create Winget manifest
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          cat > LemonadeNexus.LemonadeNexusVPN.yaml << EOF
          # Created by GitHub Actions
          Id: LemonadeNexus.LemonadeNexusVPN
          Publisher: Lemonade Nexus
          Name: Lemonade Nexus VPN
          Version: $VERSION
          License: Proprietary
          LicenseUrl: https://github.com/antmi/lemonade-nexus/blob/main/LICENSE
          PublisherUrl: https://github.com/antmi/lemonade-nexus
          PublisherSupportUrl: https://github.com/antmi/lemonade-nexus/issues
          ReleaseNotesUrl: https://github.com/antmi/lemonade-nexus/releases/tag/v$VERSION
          ShortDescription: Secure WireGuard Mesh VPN Client
          Description: |
            Lemonade Nexus VPN is a secure WireGuard mesh VPN client for Windows.
            It provides encrypted peer-to-peer connectivity with automatic key rotation
            and certificate-based authentication.
          Tags:
            - vpn
            - wireguard
            - mesh
            - security
            - networking
          Installers:
            - Architecture: x64
              InstallerType: msix
              InstallerUrl: https://github.com/antmi/lemonade-nexus/releases/download/v$VERSION/${{ steps.msix-file.outputs.filename }}
              InstallerSha256: $(sha256sum ${{ steps.msix-file.outputs.filename }} | cut -d' ' -f1)
              Scope: user
          EOF

      - name: Submit to Winget
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: LemonadeNexus.LemonadeNexusVPN
          version: ${{ needs.get-version.outputs.version }}
          release-tag: v${{ needs.get-version.outputs.version }}
          installers-regex: 'lemonade_nexus-.*\.msix$'
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
