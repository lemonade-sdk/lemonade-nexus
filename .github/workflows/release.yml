name: Build, Sign & Release

on:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release

jobs:
  # =========================================================================
  # Native platform builds (macOS, Windows)
  # =========================================================================
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary_ext: ""
          - os: macos-14
            platform: darwin-arm64
            binary_ext: ""
          - os: windows-2022
            platform: windows-x86_64
            binary_ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: vcpkg-windows-openssl-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-windows-openssl-

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.platform }}-${{ hashFiles('cmake/libraries/*.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.platform }}-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev pkg-config libjson-c-dev libcurl4-openssl-dev uuid-dev

      # macOS builds OpenSSL from source (static) via -DOPENSSL_FORCE_BUNDLED=ON
      # in the Configure step, so no Homebrew OpenSSL path is needed here.

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\vcpkg-binary-cache" | Out-Null
          $env:VCPKG_DEFAULT_BINARY_CACHE = "$env:GITHUB_WORKSPACE\vcpkg-binary-cache"
          vcpkg install openssl:x64-windows-static-md

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: "Use D: drive for build (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "D:\build" -Force
          # Move cached _deps to D:\build if cache restored into build/
          if (Test-Path "build\_deps") {
            Copy-Item -Recurse -Force "build\_deps" "D:\build\_deps"
          }
          Remove-Item -Recurse -Force "build" -ErrorAction SilentlyContinue
          New-Item -ItemType Junction -Path "build" -Target "D:\build"

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=OFF \
            -DGIT_TAG_OVERRIDE="${GITHUB_REF_NAME}" \
            -DOPENSSL_FORCE_BUNDLED=${{ runner.os == 'macOS' && 'ON' || 'OFF' }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Use the vcpkg static OpenSSL (x64-windows-static-md) installed above.
          # Choco's OpenSSL is 4.x, whose const-qualified X509 APIs break the build.
          $opensslRoot = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          cmake -B build `
            -G Ninja `
            "-DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}" `
            -DBUILD_TESTING=OFF `
            "-DGIT_TAG_OVERRIDE=${{ github.ref_name }}" `
            "-DOPENSSL_ROOT_DIR=$opensslRoot" `
            -DOPENSSL_USE_STATIC_LIBS=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Compute binary SHA-256 (Unix)
        if: runner.os != 'Windows'
        id: hash
        run: |
          BINARY_PATH="build/projects/LemonadeNexus/lemonade-nexus"
          if [ ! -f "$BINARY_PATH" ]; then
            BINARY_PATH="build/projects/LemonadeNexus/${{ env.BUILD_TYPE }}/lemonade-nexus"
          fi
          HASH=$(shasum -a 256 "$BINARY_PATH" | awk '{print $1}')
          echo "binary_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"
          echo "Binary SHA-256: $HASH"

      - name: Compute binary SHA-256 (Windows)
        if: runner.os == 'Windows'
        id: hash-win
        shell: pwsh
        run: |
          $binaryPath = "build/projects/LemonadeNexus/lemonade-nexus.exe"
          if (-not (Test-Path $binaryPath)) {
            $binaryPath = "build/projects/LemonadeNexus/${{ env.BUILD_TYPE }}/lemonade-nexus.exe"
          }
          $hash = (Get-FileHash -Path $binaryPath -Algorithm SHA256).Hash.ToLower()
          "binary_hash=$hash" >> $env:GITHUB_OUTPUT
          "binary_path=$binaryPath" >> $env:GITHUB_OUTPUT
          Write-Host "Binary SHA-256: $hash"

      - name: Set hash output
        id: hash-final
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "binary_hash=${{ steps.hash-win.outputs.binary_hash }}" >> "$GITHUB_OUTPUT"
            echo "binary_path=${{ steps.hash-win.outputs.binary_path }}" >> "$GITHUB_OUTPUT"
          else
            echo "binary_hash=${{ steps.hash.outputs.binary_hash }}" >> "$GITHUB_OUTPUT"
            echo "binary_path=${{ steps.hash.outputs.binary_path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release manifest
        id: manifest
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          COMMIT="${GITHUB_SHA}"
          TIMESTAMP=$(date +%s)
          PLATFORM="${{ matrix.platform }}"
          HASH="${{ steps.hash-final.outputs.binary_hash }}"

          # Create the canonical JSON (fields sorted alphabetically by nlohmann::json)
          # This MUST match canonical_manifest_json() in BinaryAttestation.cpp
          CANONICAL="{\"binary_sha256\":\"${HASH}\",\"commit_sha\":\"${COMMIT}\",\"platform\":\"${PLATFORM}\",\"signer_pubkey\":\"${RELEASE_SIGNING_PUBKEY}\",\"timestamp\":${TIMESTAMP},\"version\":\"${VERSION}\"}"
          echo "canonical=$CANONICAL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_SIGNING_PUBKEY: ${{ vars.RELEASE_SIGNING_PUBKEY }}

      - name: Install Python signing dependencies
        run: pip3 install pynacl --break-system-packages || pip3 install pynacl

      - name: Sign manifest with Ed25519
        id: sign
        shell: bash
        run: |
          python3 <<'PYEOF'
          import nacl.signing
          import nacl.encoding
          import os

          signing_key_b64 = os.environ["RELEASE_SIGNING_KEY"]
          signing_key_bytes = nacl.encoding.Base64Encoder.decode(signing_key_b64)
          signing_key = nacl.signing.SigningKey(signing_key_bytes)

          verify_key = signing_key.verify_key
          pubkey_b64 = verify_key.encode(nacl.encoding.Base64Encoder).decode()

          canonical = os.environ["CANONICAL"]
          signature = signing_key.sign(canonical.encode(), encoder=nacl.encoding.RawEncoder)
          sig_b64 = nacl.encoding.Base64Encoder.encode(signature.signature).decode()

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"signature={sig_b64}\n")
              f.write(f"pubkey={pubkey_b64}\n")
          PYEOF
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          CANONICAL: ${{ steps.manifest.outputs.canonical }}

      - name: Write signed manifest JSON
        shell: bash
        run: |
          cat > manifest-${{ matrix.platform }}.json <<EOF
          {
            "version": "${{ steps.manifest.outputs.version }}",
            "commit_sha": "${GITHUB_SHA}",
            "platform": "${{ matrix.platform }}",
            "binary_sha256": "${{ steps.hash-final.outputs.binary_hash }}",
            "timestamp": ${{ steps.manifest.outputs.timestamp }},
            "signer_pubkey": "${{ steps.sign.outputs.pubkey }}",
            "signature": "${{ steps.sign.outputs.signature }}"
          }
          EOF

          echo "--- Signed manifest ---"
          cat manifest-${{ matrix.platform }}.json

      - name: Build packages (macOS .pkg)
        if: runner.os == 'macOS'
        run: cpack --config build/CPackConfig.cmake -G productbuild -B build/packages

      - name: Build packages (Windows NSIS)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cpack --config build/CPackConfig.cmake -G NSIS -B build/packages
        continue-on-error: true

      - name: Build packages (Windows ZIP)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cpack --config build/CPackConfig.cmake -G ZIP -B build/packages

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-${{ matrix.platform }}
          path: ${{ steps.hash-final.outputs.binary_path }}

      - name: Upload .pkg artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-${{ matrix.platform }}-pkg
          path: build/packages/*.pkg

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-${{ matrix.platform }}-installer
          path: |
            build/packages/*.exe
            build/packages/*.zip
          if-no-files-found: ignore

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ matrix.platform }}
          path: manifest-${{ matrix.platform }}.json

  # =========================================================================
  # Linux distro builds (Debian, Fedora, Arch)
  # =========================================================================
  build-linux-distros:
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: debian:bookworm
            platform: linux-x86_64-deb
            cpack_generators: "DEB"
            install_cmd: >-
              apt-get update &&
              apt-get install -y cmake ninja-build make g++ libssl-dev pkg-config
              libjson-c-dev libcurl4-openssl-dev uuid-dev git ca-certificates curl
              python3 python3-pip python3-venv dpkg-dev
          - container: fedora:40
            platform: linux-x86_64-rpm
            cpack_generators: "RPM"
            install_cmd: >-
              dnf install -y cmake ninja-build make gcc-c++ openssl-devel
              pkgconf-pkg-config json-c-devel libcurl-devel libuuid-devel git
              python3 python3-pip rpm-build
          - container: archlinux:latest
            platform: linux-x86_64-arch
            cpack_generators: "TGZ"
            install_cmd: >-
              pacman -Syu --noconfirm cmake ninja make gcc openssl pkgconf json-c curl util-linux-libs git
              python python-pip python-pynacl
          - container: amazonlinux:2023
            platform: linux-x86_64-amzn2023
            cpack_generators: "RPM"
            # AL2023's defaults are too old for this codebase: GCC 11.5 lacks the
            # <expected> header (need GCC 14, same major as the green Fedora 40
            # build) and CMake 3.22 is below the 3.25.1 floor (pull current CMake
            # from PyPI). Symlink GCC 14 as the default cc/g++ on PATH so the
            # shared Configure step auto-detects it.
            install_cmd: >-
              dnf install -y ninja-build make gcc14 gcc14-c++ openssl-devel
              pkgconf-pkg-config json-c-devel libcurl-devel libuuid-devel git
              ca-certificates tar gzip python3 python3-pip rpm-build &&
              ln -sf /usr/bin/gcc14-gcc /usr/local/bin/gcc &&
              ln -sf /usr/bin/gcc14-gcc /usr/local/bin/cc &&
              ln -sf /usr/bin/gcc14-g++ /usr/local/bin/g++ &&
              ln -sf /usr/bin/gcc14-g++ /usr/local/bin/c++ &&
              pip3 install cmake

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - name: Install dependencies
        run: ${{ matrix.install_cmd }}

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.platform }}-${{ hashFiles('cmake/libraries/*.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.platform }}-

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=OFF \
            -DGIT_TAG_OVERRIDE="${GITHUB_REF_NAME}"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Compute binary SHA-256
        id: hash
        run: |
          BINARY_PATH="build/projects/LemonadeNexus/lemonade-nexus"
          if [ ! -f "$BINARY_PATH" ]; then
            BINARY_PATH="build/projects/LemonadeNexus/${{ env.BUILD_TYPE }}/lemonade-nexus"
          fi
          HASH=$(sha256sum "$BINARY_PATH" | awk '{print $1}')
          echo "binary_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "binary_path=$BINARY_PATH" >> "$GITHUB_OUTPUT"
          echo "Binary SHA-256: $HASH"

      - name: Create release manifest
        id: manifest
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          COMMIT="${GITHUB_SHA}"
          TIMESTAMP=$(date +%s)
          PLATFORM="${{ matrix.platform }}"
          HASH="${{ steps.hash.outputs.binary_hash }}"

          CANONICAL="{\"binary_sha256\":\"${HASH}\",\"commit_sha\":\"${COMMIT}\",\"platform\":\"${PLATFORM}\",\"signer_pubkey\":\"${RELEASE_SIGNING_PUBKEY}\",\"timestamp\":${TIMESTAMP},\"version\":\"${VERSION}\"}"
          echo "canonical=$CANONICAL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
        env:
          RELEASE_SIGNING_PUBKEY: ${{ vars.RELEASE_SIGNING_PUBKEY }}

      - name: Install PyNaCl
        run: pip3 install pynacl --break-system-packages || pip3 install pynacl

      - name: Sign manifest with Ed25519
        id: sign
        run: |
          python3 <<'PYEOF'
          import nacl.signing
          import nacl.encoding
          import os

          signing_key_b64 = os.environ["RELEASE_SIGNING_KEY"]
          signing_key_bytes = nacl.encoding.Base64Encoder.decode(signing_key_b64)
          signing_key = nacl.signing.SigningKey(signing_key_bytes)

          verify_key = signing_key.verify_key
          pubkey_b64 = verify_key.encode(nacl.encoding.Base64Encoder).decode()

          canonical = os.environ["CANONICAL"]
          signature = signing_key.sign(canonical.encode(), encoder=nacl.encoding.RawEncoder)
          sig_b64 = nacl.encoding.Base64Encoder.encode(signature.signature).decode()

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"signature={sig_b64}\n")
              f.write(f"pubkey={pubkey_b64}\n")
          PYEOF
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          CANONICAL: ${{ steps.manifest.outputs.canonical }}

      - name: Write signed manifest JSON
        run: |
          cat > manifest-${{ matrix.platform }}.json <<EOF
          {
            "version": "${{ steps.manifest.outputs.version }}",
            "commit_sha": "${GITHUB_SHA}",
            "platform": "${{ matrix.platform }}",
            "binary_sha256": "${{ steps.hash.outputs.binary_hash }}",
            "timestamp": ${{ steps.manifest.outputs.timestamp }},
            "signer_pubkey": "${{ steps.sign.outputs.pubkey }}",
            "signature": "${{ steps.sign.outputs.signature }}"
          }
          EOF

          echo "--- Signed manifest ---"
          cat manifest-${{ matrix.platform }}.json

      - name: Build packages via CPack
        run: |
          for gen in ${{ matrix.cpack_generators }}; do
            cpack --config build/CPackConfig.cmake -G "$gen" -B build/packages || true
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-${{ matrix.platform }}
          path: ${{ steps.hash.outputs.binary_path }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lemonade-nexus-${{ matrix.platform }}-pkg
          path: |
            build/packages/*.deb
            build/packages/*.rpm
            build/packages/*.tar.gz
          if-no-files-found: ignore

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ matrix.platform }}
          path: manifest-${{ matrix.platform }}.json

  # =========================================================================
  # Create GitHub Release with all platform artifacts
  # =========================================================================
  release:
    needs: [build-native, build-linux-distros]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Compute version strings
        run: |
          # VERSION_CLEAN strips the 'v' prefix for CPack package filenames
          echo "VERSION_CLEAN=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Rename binaries with version and platform suffixes
        run: |
          VERSION="${GITHUB_REF_NAME}"  # e.g. v0.3.0-alpha
          # Rename bare binaries to include version + platform in filename
          for dir in lemonade-nexus-linux-x86_64 lemonade-nexus-linux-x86_64-deb \
                     lemonade-nexus-linux-x86_64-rpm lemonade-nexus-linux-x86_64-arch \
                     lemonade-nexus-linux-x86_64-amzn2023 \
                     lemonade-nexus-darwin-arm64; do
            platform="${dir#lemonade-nexus-}"
            if [ -f "$dir/lemonade-nexus" ]; then
              mv "$dir/lemonade-nexus" "$dir/lemonade-nexus-${VERSION}-${platform}"
            fi
          done
          # Windows binary
          if [ -f "lemonade-nexus-windows-x86_64/lemonade-nexus.exe" ]; then
            mv "lemonade-nexus-windows-x86_64/lemonade-nexus.exe" \
               "lemonade-nexus-windows-x86_64/lemonade-nexus-${VERSION}-windows-x86_64.exe"
          fi
          # Disambiguate the Amazon Linux 2023 RPM — CPack names it identically to
          # the Fedora RPM, which would collide as a release asset.
          for rpm in lemonade-nexus-linux-x86_64-amzn2023-pkg/*.rpm; do
            [ -f "$rpm" ] || continue
            mv "$rpm" "${rpm%.rpm}.amzn2023.rpm"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lemonade-nexus-linux-x86_64/*
            lemonade-nexus-linux-x86_64-deb/*
            lemonade-nexus-linux-x86_64-rpm/*
            lemonade-nexus-linux-x86_64-arch/*
            lemonade-nexus-linux-x86_64-amzn2023/*
            lemonade-nexus-darwin-arm64/*
            lemonade-nexus-windows-x86_64/*
            lemonade-nexus-linux-x86_64-deb-pkg/*
            lemonade-nexus-linux-x86_64-rpm-pkg/*
            lemonade-nexus-linux-x86_64-arch-pkg/*
            lemonade-nexus-linux-x86_64-amzn2023-pkg/*
            lemonade-nexus-darwin-arm64-pkg/*
            lemonade-nexus-windows-x86_64-installer/*
            manifest-linux-x86_64/*
            manifest-linux-x86_64-deb/*
            manifest-linux-x86_64-rpm/*
            manifest-linux-x86_64-arch/*
            manifest-linux-x86_64-amzn2023/*
            manifest-darwin-arm64/*
            manifest-windows-x86_64/*
          generate_release_notes: true
          body: |
            ## Lemonade-Nexus Release ${{ github.ref_name }}

            ### Platforms
            | Platform | Binary | Manifest |
            |----------|--------|----------|
            | Linux x86_64 (Ubuntu) | `lemonade-nexus-${{ github.ref_name }}-linux-x86_64` | `manifest-linux-x86_64.json` |
            | Linux x86_64 (Debian .deb) | `lemonade-nexus-${{ env.VERSION_CLEAN }}-Linux-x86_64.deb` | `manifest-linux-x86_64-deb.json` |
            | Linux x86_64 (Fedora .rpm) | `lemonade-nexus-${{ env.VERSION_CLEAN }}-Linux-x86_64.rpm` | `manifest-linux-x86_64-rpm.json` |
            | Linux x86_64 (Arch) | `lemonade-nexus-${{ github.ref_name }}-linux-x86_64-arch` | `manifest-linux-x86_64-arch.json` |
            | Linux x86_64 (Amazon Linux 2023 .rpm) | `lemonade-nexus-${{ env.VERSION_CLEAN }}-Linux-x86_64.amzn2023.rpm` | `manifest-linux-x86_64-amzn2023.json` |
            | macOS ARM64 | `lemonade-nexus-${{ github.ref_name }}-darwin-arm64` | `manifest-darwin-arm64.json` |
            | Windows x86_64 | `lemonade-nexus-${{ github.ref_name }}-windows-x86_64.exe` | `manifest-windows-x86_64.json` |

            ### Install

            **Debian/Ubuntu (.deb)**
            ```bash
            sudo dpkg -i lemonade-nexus-*.deb
            sudo vi /etc/lemonade-nexus/lemonade-nexus.env
            sudo systemctl start lemonade-nexus
            ```

            **macOS Server (.pkg)**
            ```bash
            sudo installer -pkg lemonade-nexus-*.pkg -target /
            sudo launchctl load /Library/LaunchDaemons/io.lemonade-nexus.plist
            ```

            **Windows (.exe / .zip)**
            Run the NSIS installer or extract the ZIP to `C:\Program Files\lemonade-nexus\`.

            ### Binary Attestation
            Each server binary has a corresponding Ed25519-signed release manifest (`manifest-*.json`).
            Import manifests on your server with:
            ```
            lemonade-nexus --add-manifest manifest-linux-x86_64.json
            ```

            ### Verification
            Manifests are signed with the project's Ed25519 release signing key.
            Only binaries whose SHA-256 matches a signed manifest can achieve
            Tier 1 trust status and receive distributed operational credentials.
