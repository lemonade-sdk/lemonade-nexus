name: CI Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Set OpenSSL path (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "OPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3" >> "$GITHUB_ENV"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja -y
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV

      - name: Install OpenSSL via vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install openssl:x64-windows

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBUILD_TESTING=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C ${{ env.BUILD_TYPE }}

  build-linux-distros:
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: debian:bookworm
            platform: linux-x86_64-deb
            install_cmd: >-
              apt-get update &&
              apt-get install -y cmake ninja-build g++ libssl-dev git ca-certificates
          - container: fedora:40
            platform: linux-x86_64-rpm
            install_cmd: >-
              dnf install -y cmake ninja-build gcc-c++ openssl-devel git
          - container: archlinux:latest
            platform: linux-x86_64-arch
            install_cmd: >-
              pacman -Syu --noconfirm cmake ninja gcc openssl git

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - name: Install dependencies
        run: ${{ matrix.install_cmd }}

      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C ${{ env.BUILD_TYPE }}
