name: CI Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-2022
            platform: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.os }}-${{ hashFiles('cmake/libraries/*.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.os }}-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev pkg-config libjson-c-dev libcurl4-openssl-dev uuid-dev

      - name: Set OpenSSL path (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "OPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3" >> "$GITHUB_ENV"

      - name: Cache vcpkg binaries (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: vcpkg-binary-cache
          key: vcpkg-openssl-${{ matrix.os }}-${{ github.run_id }}
          restore-keys: |
            vcpkg-openssl-${{ matrix.os }}-

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\vcpkg-binary-cache" | Out-Null
          $env:VCPKG_DEFAULT_BINARY_CACHE = "$env:GITHUB_WORKSPACE\vcpkg-binary-cache"
          vcpkg install openssl:x64-windows-static-md

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: "Use D: drive for build (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "D:\build" -Force
          if (Test-Path "build\_deps") {
            Copy-Item -Recurse -Force "build\_deps" "D:\build\_deps"
          }
          Remove-Item -Recurse -Force "build" -ErrorAction SilentlyContinue
          New-Item -ItemType Junction -Path "build" -Target "D:\build"

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $opensslRoot = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          cmake -B build `
            -G Ninja `
            "-DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}" `
            -DBUILD_TESTING=ON `
            "-DOPENSSL_ROOT_DIR=$opensslRoot" `
            -DOPENSSL_USE_STATIC_LIBS=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C ${{ env.BUILD_TYPE }}

  build-linux-distros:
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: debian:bookworm
            platform: linux-x86_64-deb
            install_cmd: >-
              apt-get update &&
              apt-get install -y cmake ninja-build g++ libssl-dev pkg-config
              libjson-c-dev libcurl4-openssl-dev uuid-dev git ca-certificates curl
          - container: fedora:40
            platform: linux-x86_64-rpm
            install_cmd: >-
              dnf install -y cmake ninja-build gcc-c++ openssl-devel
              pkgconf-pkg-config json-c-devel libcurl-devel libuuid-devel git
          - container: archlinux:latest
            platform: linux-x86_64-arch
            install_cmd: >-
              pacman -Syu --noconfirm cmake ninja gcc openssl pkgconf json-c curl util-linux-libs git

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}

    steps:
      - name: Install dependencies
        run: ${{ matrix.install_cmd }}

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v5

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.container }}-${{ hashFiles('cmake/libraries/*.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.container }}-

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C ${{ env.BUILD_TYPE }}
